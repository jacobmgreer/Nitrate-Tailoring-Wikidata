name: SPARQL Weekly Release

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

# Allow the release action to create/update releases
permissions:
  contents: write

concurrency:
  group: weekly-release
  cancel-in-progress: true

jobs:
  generate-data:
    runs-on: ubuntu-latest
    env:
      # R version (re-used in cache key)
      R_VERSION: "4.1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Prepare R library dir
        run: |
          # Set R_LIBS_USER to the runner temporary directory so we can cache it
          echo "R_LIBS_USER=${RUNNER_TEMP}/Rlibs" >> $GITHUB_ENV

      - name: Setup R
        uses: r-lib/actions/setup-r@v2.11.4
        with:
          r-version: ${{ env.R_VERSION }}
          use-public-rspm: true

      - name: Cache R libraries
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/Rlibs
          # Prefer renv.lock for cache key if you use renv; otherwise DESCRIPTION at repo root
          key: ${{ runner.os }}-r-${{ env.R_VERSION }}-${{ hashFiles('renv.lock') }}-${{ hashFiles('DESCRIPTION') }}
          restore-keys: |
            ${{ runner.os }}-r-${{ env.R_VERSION }}-

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2.11.4
        with:
          pak-version: "stable"    # options: stable | repo | none
          cache: true              # enable pak's package cache (speeds repeated runs)
          extra-packages: |
            any::tidyverse
            any::arrow
            any::jsonlite
            any::httr
            any::curl
            any::readr

      - name: Run SPARQL script
        run: Rscript R/nightly.R

      - name: Set weekly release tag
        run: |
          # Compute ISO week-numbering year and week (YYYY-WW) into a shell variable,
          # then write that value into GITHUB_ENV so subsequent steps see it.
          TAG=$(date -u +%G-%V)
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=Weekly Release $TAG" >> "$GITHUB_ENV"
          echo "RELEASE_BODY=Automated release for $TAG" >> "$GITHUB_ENV"

      - name: Create or update weekly release
        if: ${{ success() }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          body: ${{ env.RELEASE_BODY }}
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete workflow runs
        if: ${{ always() }}
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 14
          keep_minimum_runs: 6
