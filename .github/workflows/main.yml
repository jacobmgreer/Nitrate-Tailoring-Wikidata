name: SPARQL Weekly Release

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  generate-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::tidyverse
            any::arrow
            any::jsonlite

      - name: Run SPARQL script
        run: Rscript R/nightly.R

      - name: Set weekly release tag
        run: |
          # Compute ISO week-numbering year and week (YYYY-WW) into a shell variable,
          # then write that value into GITHUB_ENV so subsequent steps see it.
          TAG=$(date -u +%G-%V)
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=Weekly Release $TAG" >> "$GITHUB_ENV"
          echo "RELEASE_BODY=Automated release for $TAG" >> "$GITHUB_ENV"

      - name: Create or update weekly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          body: ${{ env.RELEASE_BODY }}
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete workflow runs
        if: ${{ always() }}
        uses: Mattraks/delete-workflow-runs@v2.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 14
          keep_minimum_runs: 6
